services:
  db:
    image: postgres:15-alpine
    container_name: unipin_postgres
    environment:
      POSTGRES_USER: unipin
      POSTGRES_PASSWORD: unipinpassword
      POSTGRES_DB: unipin_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unipin -d unipin_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unipin_backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://unipin:unipinpassword@db:5432/unipin_db
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unipin_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  pgdata:
